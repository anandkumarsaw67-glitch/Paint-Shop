<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saw & Sons Enterprises | Premium Paint Shop</title>
    <meta name="description" content="Saw & Sons Enterprises - Premium Interior & Exterior Painting Solutions. High-quality paints, expert supplies, and professional services.">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav id="navbar">
            <div class="logo">
                <img src="./assets/logo.png" alt="Saw & Sons Logo">
                <span>SAW & SONS</span>
            </div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Paint Products</a></li>
                <li><a href="#supplies">Supplies</a></li>
                <li><a href="#about">About Us</a></li>
            </ul>
            <div class="nav-actions">
                <div class="cart-icon" id="cart-btn">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cart-count">0</span>
                </div>
                <div id="auth-status"></div>
                <div class="menu-btn" id="menu-toggle">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </nav>

        <!-- Mobile Navigation Drawer -->
        <div id="mobile-menu" class="mobile-menu">
            <div class="mobile-menu-header">
                <div class="logo">
                    <img src="./assets/logo.png" alt="Saw & Sons Logo">
                    <span>SAW & SONS</span>
                </div>
                <i class="fas fa-times" id="menu-close"></i>
            </div>
            <ul class="mobile-nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Paint Products</a></li>
                <li><a href="#supplies">Supplies</a></li>
                <li><a href="#about">About Us</a></li>
                <li><a href="#admin">Admin Dashboard</a></li>
            </ul>
            <div class="mobile-menu-footer">
                <p>&copy; 2024 Saw & Sons Enterprises</p>
            </div>
        </div>


        <main id="main-content">
            <!-- Content will be dynamically rendered here -->
        </main>




        <!-- Cart Drawer -->
        <div id="cart-drawer" class="drawer">
            <!-- Cart content -->
        </div>

        <!-- Add Product Modal -->
        <div id="product-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add New Product</h2>
                    <span class="close-modal">&times;</span>
                </div>
                <form id="product-form">
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="p-name" required placeholder="e.g. Asian Paints Royale">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="p-category" required>
                            <option value="Interior">Interior</option>
                            <option value="Exterior">Exterior</option>
                            <option value="Supplies">Supplies</option>
                            <option value="Specialty">Specialty</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Price ($)</label>
                            <input type="number" id="p-price" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>Stock Units</label>
                            <input type="number" id="p-stock" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="p-desc" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Product Image (System/Gallery)</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="p-image-file" accept="image/*">
                            <div id="image-preview" class="image-preview">No image selected</div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Save Product</button>
                </form>
            </div>
        </div>

        <!-- Cart Drawer -->
        <div id="cart-drawer" class="drawer"></div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
